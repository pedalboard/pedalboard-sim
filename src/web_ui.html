<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedalboard Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}
.container {
    max-width: 900px;
    width: 100%;
}
header {
    text-align: center;
    margin-bottom: 24px;
}
header h1 {
    font-size: 1.5rem;
    color: #aaa;
    letter-spacing: 4px;
    text-transform: uppercase;
}
.preset-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    background: #222;
    border-radius: 8px;
    padding: 12px 20px;
    border: 1px solid #333;
}
.preset-name {
    font-size: 1.2rem;
    font-weight: bold;
    color: #fff;
    min-width: 200px;
    text-align: center;
}
.preset-nav {
    display: flex;
    gap: 6px;
}
.preset-btn {
    background: #333;
    border: 1px solid #555;
    color: #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    transition: background 0.15s;
}
.preset-btn:hover { background: #444; }
.preset-btn:active { background: #555; }
.preset-btn.active { background: #555; border-color: #888; color: #fff; }
.buttons-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 32px;
}
.foot-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    background: #2a2a2a;
    border: 2px solid #444;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    padding: 12px;
    min-height: 100px;
    user-select: none;
    position: relative;
}
.foot-button:hover { border-color: #666; }
.foot-button:active { transform: scale(0.95); }
.foot-button.active {
    border-color: var(--btn-color, #666);
    box-shadow: 0 0 20px var(--btn-color, #333), inset 0 0 15px rgba(0,0,0,0.4);
}
.foot-button .led {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #333;
    margin-bottom: 8px;
    transition: all 0.15s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.foot-button.active .led {
    background: var(--btn-color, #666);
    box-shadow: 0 0 12px var(--btn-color, #666), 0 0 4px var(--btn-color, #666);
}
.foot-button .label {
    font-size: 0.85rem;
    color: #bbb;
    text-align: center;
    word-break: break-word;
}
.foot-button .key-hint {
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 0.65rem;
    color: #555;
}
.encoders-row {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-bottom: 32px;
}
.encoder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}
.encoder-knob {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #555, #222);
    border: 2px solid #666;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: ns-resize;
    user-select: none;
    position: relative;
    transition: transform 0.1s;
}
.encoder-knob::after {
    content: '';
    width: 4px;
    height: 20px;
    background: #ccc;
    border-radius: 2px;
    position: absolute;
    top: 10px;
    transform-origin: center 30px;
}
.encoder-label {
    font-size: 0.85rem;
    color: #aaa;
}
.encoder-value {
    font-size: 0.75rem;
    color: #666;
}
.status-bar {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 20px;
    text-align: center;
    font-size: 0.8rem;
    color: #666;
}
.status-bar.connected { border-color: #2a5; }
.status-bar.disconnected { border-color: #a33; }
.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: #a33;
}
.status-bar.connected .status-dot { background: #2a5; }
@media (max-width: 600px) {
    .buttons-row { grid-template-columns: repeat(3, 1fr); }
    .encoders-row { gap: 30px; }
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Pedalboard Simulator</h1>
    </header>
    <div class="preset-bar">
        <div class="preset-nav" id="preset-nav"></div>
        <div class="preset-name" id="preset-name">(no config)</div>
    </div>
    <div class="buttons-row" id="buttons-row"></div>
    <div class="encoders-row" id="encoders-row"></div>
    <div class="status-bar disconnected" id="status-bar">
        <span class="status-dot"></span>Connecting...
    </div>
</div>
<script>
(function() {
    let ws = null;
    let reconnectTimer = null;

    const statusBar = document.getElementById('status-bar');
    const presetName = document.getElementById('preset-name');
    const presetNav = document.getElementById('preset-nav');
    const buttonsRow = document.getElementById('buttons-row');
    const encodersRow = document.getElementById('encoders-row');

    function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws');

        ws.onopen = function() {
            statusBar.className = 'status-bar connected';
            statusBar.innerHTML = '<span class="status-dot"></span>Connected';
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        };

        ws.onclose = function() {
            statusBar.className = 'status-bar disconnected';
            statusBar.innerHTML = '<span class="status-dot"></span>Disconnected — reconnecting...';
            scheduleReconnect();
        };

        ws.onerror = function() {
            ws.close();
        };

        ws.onmessage = function(evt) {
            try {
                const state = JSON.parse(evt.data);
                renderState(state);
            } catch(e) {
                console.error('Bad message:', e);
            }
        };
    }

    function scheduleReconnect() {
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(function() {
                reconnectTimer = null;
                connect();
            }, 1500);
        }
    }

    function sendAction(action) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(action));
        }
    }

    function renderState(state) {
        // Preset name
        presetName.textContent = state.preset_name || '(no config)';

        // Preset nav buttons
        if (state.num_presets > 0) {
            let navHtml = '';
            for (let i = 0; i < state.num_presets; i++) {
                const active = i === state.active_preset ? ' active' : '';
                navHtml += '<button class="preset-btn' + active + '" data-preset="' + i + '">' + (i + 1) + '</button>';
            }
            presetNav.innerHTML = navHtml;
            presetNav.querySelectorAll('.preset-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    sendAction({ type: 'preset_select', index: parseInt(this.dataset.preset) });
                });
            });
        } else {
            presetNav.innerHTML = '';
        }

        // Buttons
        let btnHtml = '';
        for (let i = 0; i < state.buttons.length; i++) {
            const b = state.buttons[i];
            const activeClass = b.active ? ' active' : '';
            btnHtml += '<div class="foot-button' + activeClass + '" style="--btn-color:' + b.color + '" data-btn="' + i + '">';
            btnHtml += '<div class="led"></div>';
            btnHtml += '<div class="label">' + escapeHtml(b.label) + '</div>';
            btnHtml += '<div class="key-hint">' + (i + 1) + '</div>';
            btnHtml += '</div>';
        }
        buttonsRow.innerHTML = btnHtml;
        buttonsRow.querySelectorAll('.foot-button').forEach(function(el) {
            el.addEventListener('mousedown', function(e) {
                e.preventDefault();
                sendAction({ type: 'button_down', index: parseInt(this.dataset.btn) });
            });
            el.addEventListener('mouseup', function(e) {
                e.preventDefault();
                sendAction({ type: 'button_up', index: parseInt(this.dataset.btn) });
            });
            el.addEventListener('mouseleave', function(e) {
                // Release if mouse leaves while held
                if (e.buttons > 0) {
                    sendAction({ type: 'button_up', index: parseInt(this.dataset.btn) });
                }
            });
            el.addEventListener('touchstart', function(e) {
                e.preventDefault();
                sendAction({ type: 'button_down', index: parseInt(this.dataset.btn) });
            });
            el.addEventListener('touchend', function(e) {
                e.preventDefault();
                sendAction({ type: 'button_up', index: parseInt(this.dataset.btn) });
            });
        });

        // Encoders
        let encHtml = '';
        for (let i = 0; i < state.encoders.length; i++) {
            const enc = state.encoders[i];
            const rotation = (enc.value / 127) * 270 - 135;
            encHtml += '<div class="encoder" data-enc="' + i + '">';
            encHtml += '<div class="encoder-knob" style="transform: rotate(' + rotation + 'deg)"></div>';
            encHtml += '<div class="encoder-label">' + escapeHtml(enc.label) + '</div>';
            encHtml += '<div class="encoder-value">' + enc.value + '</div>';
            encHtml += '</div>';
        }
        encodersRow.innerHTML = encHtml;
        encodersRow.querySelectorAll('.encoder').forEach(function(el) {
            el.addEventListener('wheel', function(e) {
                e.preventDefault();
                const idx = parseInt(this.dataset.enc);
                const clockwise = e.deltaY < 0;
                sendAction({ type: 'encoder_turn', index: idx, clockwise: clockwise });
            }, { passive: false });
        });
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    // Keyboard shortcuts
    var keysHeld = {};
    document.addEventListener('keydown', function(e) {
        if (keysHeld[e.key]) return; // prevent repeat
        keysHeld[e.key] = true;
        if (e.key >= '1' && e.key <= '6') {
            sendAction({ type: 'button_down', index: parseInt(e.key) - 1 });
        } else if (e.key === 'ArrowLeft') {
            sendAction({ type: 'encoder_turn', index: 0, clockwise: false });
        } else if (e.key === 'ArrowRight') {
            sendAction({ type: 'encoder_turn', index: 0, clockwise: true });
        } else if (e.key === 'ArrowUp') {
            sendAction({ type: 'encoder_turn', index: 1, clockwise: true });
        } else if (e.key === 'ArrowDown') {
            sendAction({ type: 'encoder_turn', index: 1, clockwise: false });
        }
    });
    document.addEventListener('keyup', function(e) {
        keysHeld[e.key] = false;
        if (e.key >= '1' && e.key <= '6') {
            sendAction({ type: 'button_up', index: parseInt(e.key) - 1 });
        }
    });

    connect();
})();
</script>
</body>
</html>
