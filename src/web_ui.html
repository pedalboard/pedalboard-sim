<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Pedalboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
}

.board {
    background: #2d4a3e;
    border-radius: 20px;
    padding: 16px 16px;
    box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 0 3px #1f3329;
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Silkscreen-style markings */
.board::before {
    content: 'OPEN PEDALBOARD';
    position: absolute;
    bottom: 12px;
    right: 20px;
    font-size: 0.6rem;
    color: rgba(200, 220, 200, 0.25);
    letter-spacing: 2px;
}

/* --- Encoder area --- */
.board-grid {
    position: relative;
    width: 188mm;
    height: 120mm;
}

/* All elements positioned using PCB mm coordinates.
   left = 94 + X_mm (from center to left edge)
   top = 120 - Y_mm (Y flipped)
*/
.board-grid .positioned {
    position: absolute;
    transform: translate(-50%, -50%);
}

/* Encoders: X=±37.5, Y=97 */
.pos-enc-vol  { left: 56.5mm; top: 23mm; }
.pos-enc-gain { left: 131.5mm; top: 23mm; }

/* LEDs: X=±12.5, Y=83 */
.pos-led-mode { left: 81.5mm; top: 37mm; }
.pos-led-mon  { left: 106.5mm; top: 37mm; }

/* Top buttons: X=0/±75, Y=64 */
.pos-btn-d { left: 19mm; top: 56mm; }
.pos-btn-e { left: 94mm; top: 56mm; }
.pos-btn-f { left: 169mm; top: 56mm; }

/* Bottom buttons: X=0/±75, Y=12 */
.pos-btn-a { left: 19mm; top: 108mm; }
.pos-btn-b { left: 94mm; top: 108mm; }
.pos-btn-c { left: 169mm; top: 108mm; }

/* Displays: X=±37.5, Y≈38 (between button rows) */
.pos-oled-l { left: 56.5mm; top: 82mm; }
.pos-oled-r { left: 131.5mm; top: 82mm; }

.indicator-label {
    font-size: 0.55rem;
    color: rgba(200, 220, 200, 0.4);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.indicator-led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #222;
    border: 1px solid #444;
    transition: background 0.1s, box-shadow 0.1s;
}

.indicator-led.active {
    box-shadow: 0 0 6px var(--led-color, #0f0);
    background: var(--led-color, #0f0);
}

.indicator-led-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
}

.encoder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.encoder-ring {
    position: relative;
    width: 24mm;
    height: 24mm;
}

.encoder-ring svg {
    width: 24mm;
    height: 24mm;
}

.encoder-knob {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #666, #2a2a2a);
    border: 2px solid #555;
    cursor: ns-resize;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
}

.encoder-knob .indicator {
    position: absolute;
    top: 5px;
    left: 50%;
    width: 3px;
    height: 12px;
    margin-left: -1.5px;
    background: #ddd;
    border-radius: 2px;
    transform-origin: center 19px;
}

.encoder-label {
    font-size: 0.75rem;
    color: rgba(200, 220, 200, 0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.encoder-value {
    font-size: 0.65rem;
    color: rgba(200, 220, 200, 0.35);
}

/* --- Foot button with LED ring --- */
.foot-btn {
    position: relative;
    width: 24mm;
    height: 24mm;
    display: flex;
    align-items: center;
    justify-content: center;
}

.foot-btn svg.led-ring {
    position: absolute;
    width: 24mm;
    height: 24mm;
    top: 0;
    left: 0;
}

.foot-btn .btn-cap {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #444, #1a1a1a);
    border: 2px solid #555;
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.08s, box-shadow 0.08s;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.6);
}

.foot-btn .btn-cap:active,
.foot-btn .btn-cap.pressed {
    transform: scale(0.94);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
}

.foot-btn .btn-cap .key-hint {
    font-size: 0.5rem;
    color: #555;
    position: absolute;
    bottom: -6mm;
}

/* --- OLED displays --- */

.oled {
    background: #000;
    border: 1.5px solid #444;
    border-radius: 2px;
    width: 28mm;
    height: 28mm;
    padding: 2mm;
    display: flex;
    flex-direction: column;
    box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
    overflow: hidden;
}

.oled .oled-title {
    font-size: 0.5rem;
    color: #555;
    text-align: center;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #222;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.oled .oled-row {
    flex: 1;
    display: flex;
    align-items: center;
    font-size: 0.6rem;
    color: #444;
    padding: 2px 0;
    transition: color 0.15s;
}

.oled .oled-row.active {
    color: #ffffff;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
}

.oled .oled-row .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #333;
    margin-right: 8px;
    flex-shrink: 0;
    transition: background 0.15s, box-shadow 0.15s;
}

.oled .oled-row.active .dot {
    background: var(--row-color, #fff);
    box-shadow: 0 0 6px var(--row-color, #fff);
}

/* --- Preset bar --- */
.preset-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    background: #222;
    border-radius: 8px;
    padding: 10px 20px;
    border: 1px solid #333;
    width: 100%;
    max-width: 880px;
    flex-wrap: wrap;
}

.preset-bar .preset-label {
    font-size: 0.7rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 10px;
}

.preset-btn {
    background: #333;
    border: 1px solid #555;
    color: #888;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preset-btn:hover { background: #444; color: #ccc; }
.preset-btn.active {
    background: #4a7a6a;
    border-color: #6a9a8a;
    color: #fff;
    box-shadow: 0 0 8px rgba(74, 122, 106, 0.4);
}

/* --- Status --- */
.status-bar {
    margin-top: 12px;
    font-size: 0.7rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 6px;
}

.status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a33;
    transition: background 0.3s;
}

.status-bar.connected .status-dot {
    background: #3a8;
    box-shadow: 0 0 6px rgba(51, 170, 136, 0.5);
}

/* --- Keyboard help --- */
.help-text {
    margin-top: 10px;
    font-size: 0.6rem;
    color: #444;
    text-align: center;
}

/* Responsive */
@media (max-width: 700px) {
    .board {
        padding: 24px 16px;
    }
    .board-grid { max-width: 100%; }
    .foot-btn { width: 90px; height: 90px; }
    .foot-btn svg.led-ring { width: 90px; height: 90px; }
    .foot-btn .btn-cap { width: 52px; height: 52px; }
    .encoder-ring { width: 60px; height: 60px; }
    .encoder-ring svg { width: 60px; height: 60px; }
    .encoder-knob { width: 40px; height: 40px; margin: -20px 0 0 -20px; }
    .oled { width: 130px; min-height: 130px; padding: 8px 10px; }
    .oled .oled-row { font-size: 0.75rem; }
}
</style>
</head>
<body>

<div class="board" id="board">
    <!-- All elements positioned on a coordinate grid matching the PCB -->
    <div class="board-grid">
        <!-- Encoders -->
        <div class="positioned pos-enc-vol" id="encoder-area-vol"></div>
        <div class="positioned pos-enc-gain" id="encoder-area-gain"></div>

        <!-- Indicator LEDs -->
        <div class="positioned pos-led-mode">
            <div class="indicator-led-wrap">
                <div class="indicator-led" id="led-mode"></div>
                <span class="indicator-label">Mode</span>
            </div>
        </div>
        <div class="positioned pos-led-mon">
            <div class="indicator-led-wrap">
                <div class="indicator-led" id="led-mon"></div>
                <span class="indicator-label">Mon</span>
            </div>
        </div>

        <!-- Top row buttons: D(3), E(4), F(5) -->
        <div class="positioned pos-btn-d" id="pos-btn-3"></div>
        <div class="positioned pos-btn-e" id="pos-btn-4"></div>
        <div class="positioned pos-btn-f" id="pos-btn-5"></div>

        <!-- Bottom row buttons: A(0), B(1), C(2) -->
        <div class="positioned pos-btn-a" id="pos-btn-0"></div>
        <div class="positioned pos-btn-b" id="pos-btn-1"></div>
        <div class="positioned pos-btn-c" id="pos-btn-2"></div>

        <!-- Displays -->
        <div class="positioned pos-oled-l">
            <div class="oled" id="oled-left"><div class="oled-title">—</div></div>
        </div>
        <div class="positioned pos-oled-r">
            <div class="oled" id="oled-right"><div class="oled-title">—</div></div>
        </div>
    </div>
</div>

<div class="preset-bar" id="preset-bar">
    <span class="preset-label">Preset</span>
</div>

<div class="status-bar disconnected" id="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">Connecting…</span>
</div>

<div class="help-text">Keys A–F: buttons &nbsp;|&nbsp; ←→: Vol &nbsp;|&nbsp; ↑↓: Gain</div>

<script>
(function() {
    'use strict';

    // --- Physical layout mapping ---
    const DISPLAY_LEFT = [3, 4, 0];  // D, E, A
    const DISPLAY_RIGHT = [5, 1, 2]; // F, B, C
    const NUM_SEGMENTS = 12;

    let ws = null;
    let reconnectTimer = null;
    let state = null;

    const statusBar = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');

    // --- LED Ring SVG generation ---
    // 12 segments in full 360° circle, rotated so seg 0 = 7 o'clock.
    // Segment 11 (6 o'clock) is never lit (connector position).
    function createLedRingSvg(numSegments, radius, strokeWidth, size) {
        const cx = size / 2;
        const cy = size / 2;
        const circumference = 2 * Math.PI * radius;
        const segmentLength = circumference / numSegments;
        const dash = segmentLength * 0.75;

        let svg = `<svg class="led-ring" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(120deg)">`;
        for (let i = 0; i < numSegments; i++) {
            const offset = -(i * segmentLength);
            svg += `<circle class="seg seg-${i}"
                cx="${cx}" cy="${cy}" r="${radius}"
                fill="none"
                stroke="#333"
                stroke-width="${strokeWidth}"
                stroke-dasharray="${dash} ${circumference - dash}"
                stroke-dashoffset="${offset}"
                stroke-linecap="round"/>`;
        }
        svg += '</svg>';
        return svg;
    }

    // --- Foot button creation ---
    function createFootButton(index) {
        const el = document.createElement('div');
        el.className = 'foot-btn';
        el.dataset.index = index;
        el.innerHTML = createLedRingSvg(NUM_SEGMENTS, 48, 6, 110) +
            `<div class="btn-cap" data-index="${index}">
                <span class="key-hint">${'ABCDEF'[index]}</span>
            </div>`;

        const cap = el.querySelector('.btn-cap');
        cap.addEventListener('mousedown', e => { e.preventDefault(); btnDown(index); cap.classList.add('pressed'); });
        cap.addEventListener('mouseup', e => { e.preventDefault(); btnUp(index); cap.classList.remove('pressed'); });
        cap.addEventListener('mouseleave', e => { if (e.buttons > 0) { btnUp(index); cap.classList.remove('pressed'); } });
        cap.addEventListener('touchstart', e => { e.preventDefault(); btnDown(index); cap.classList.add('pressed'); }, { passive: false });
        cap.addEventListener('touchend', e => { e.preventDefault(); btnUp(index); cap.classList.remove('pressed'); }, { passive: false });
        cap.addEventListener('touchcancel', e => { btnUp(index); cap.classList.remove('pressed'); });

        return el;
    }

    // --- Encoder creation ---
    function createEncoder(index) {
        const el = document.createElement('div');
        el.className = 'encoder';
        el.dataset.index = index;
        el.innerHTML = `
            <div class="encoder-ring">
                ${createLedRingSvg(NUM_SEGMENTS, 30, 4, 72)}
                <div class="encoder-knob">
                    <div class="indicator"></div>
                </div>
            </div>
            <div class="encoder-label"></div>
            <div class="encoder-value">0</div>`;

        el.addEventListener('wheel', e => {
            e.preventDefault();
            const clockwise = e.deltaY < 0;
            sendAction({ type: 'encoder_turn', index: index, clockwise: clockwise });
        }, { passive: false });

        return el;
    }

    // --- Build static DOM ---
    function buildLayout() {
        // Place buttons in their positioned containers
        for (let i = 0; i < 6; i++) {
            document.getElementById('pos-btn-' + i).appendChild(createFootButton(i));
        }

        // Place encoders
        document.getElementById('encoder-area-vol').appendChild(createEncoder(0));
        document.getElementById('encoder-area-gain').appendChild(createEncoder(1));
    }

    // --- Update ring segments ---
    function updateButtonRing(btnEl, btn) {
        const segs = btnEl.querySelectorAll('.seg');
        segs.forEach((seg, i) => {
            const c = btn.ring && btn.ring[i] ? btn.ring[i] : '#333';
            const isLit = c !== 'rgb(0,0,0)';
            seg.setAttribute('stroke', isLit ? c : '#222');
            seg.style.opacity = isLit ? '1' : '0.1';
            seg.style.filter = isLit ? `drop-shadow(0 0 3px ${c})` : 'none';
        });
    }

    function updateEncoderRing(encEl, value) {
        const litCount = Math.floor((value / 127) * NUM_SEGMENTS);
        const segs = encEl.querySelectorAll('.seg');
        segs.forEach((seg, i) => {
            if (i < litCount) {
                // Heatmap: green → yellow → red
                const ratio = i / (NUM_SEGMENTS - 1);
                let color;
                if (ratio < 0.5) {
                    const g = Math.round(255);
                    const r = Math.round(ratio * 2 * 255);
                    color = `rgb(${r}, ${g}, 0)`;
                } else {
                    const r = 255;
                    const g = Math.round((1 - (ratio - 0.5) * 2) * 255);
                    color = `rgb(${r}, ${g}, 0)`;
                }
                seg.setAttribute('stroke', color);
                seg.style.opacity = '1';
                seg.style.filter = `drop-shadow(0 0 2px ${color})`;
            } else {
                seg.setAttribute('stroke', '#333');
                seg.style.opacity = '0.4';
                seg.style.filter = 'none';
            }
        });
    }

    // --- Render full state ---
    function renderState(s) {
        state = s;

        // Update buttons
        document.querySelectorAll('.foot-btn').forEach(el => {
            const idx = parseInt(el.dataset.index);
            const btn = s.buttons.find(b => b.index === idx);
            if (btn) {
                updateButtonRing(el, btn);
            }
        });

        // Update encoders
        document.querySelectorAll('.encoder').forEach(el => {
            const idx = parseInt(el.dataset.index);
            const enc = s.encoders.find(e => e.index === idx);
            if (enc) {
                updateEncoderRing(el, enc.value);
                // Rotate knob indicator
                const rotation = (enc.value / 127) * 270 - 135;
                const knob = el.querySelector('.encoder-knob');
                knob.style.transform = `rotate(${rotation}deg)`;
                el.querySelector('.encoder-label').textContent = enc.label;
                el.querySelector('.encoder-value').textContent = enc.value;
            }
        });

        // Update OLED displays
        renderOled('oled-left', s.preset_name, DISPLAY_LEFT, s.buttons);
        renderOled('oled-right', s.preset_name, DISPLAY_RIGHT, s.buttons);

        // Update indicator LEDs
        updateIndicatorLeds(s);

        // Preset bar
        renderPresetBar(s);
    }

    const PRESET_COLORS = ['#00ff00','#0000ff','#ff0000','#ffff00','#00ffff','#ff00ff','#ff8800','#ffffff'];

    function updateIndicatorLeds(s) {
        // Mode LED: color based on preset bank
        const modeLed = document.getElementById('led-mode');
        const color = PRESET_COLORS[s.active_preset % PRESET_COLORS.length];
        modeLed.style.setProperty('--led-color', color);
        modeLed.classList.add('active');

        // Mon LED: flash briefly on any state update (MIDI activity)
        const monLed = document.getElementById('led-mon');
        monLed.style.setProperty('--led-color', '#00ff00');
        monLed.classList.add('active');
        clearTimeout(monLed._timer);
        monLed._timer = setTimeout(() => monLed.classList.remove('active'), 80);
    }

    function renderOled(id, presetName, indices, buttons) {
        const oled = document.getElementById(id);
        let html = `<div class="oled-title">${escapeHtml(presetName || '—')}</div>`;
        indices.forEach(idx => {
            const btn = buttons.find(b => b.index === idx);
            const label = btn ? btn.label : `Btn ${idx}`;
            const active = btn ? btn.active : false;
            const color = btn ? btn.color : '#666';
            html += `<div class="oled-row${active ? ' active' : ''}" style="--row-color: ${color}">
                <span class="dot"></span>${escapeHtml(label)}</div>`;
        });
        oled.innerHTML = html;
    }

    function renderPresetBar(s) {
        const bar = document.getElementById('preset-bar');
        let html = '<span class="preset-label">Preset</span>';
        if (s.num_presets > 0) {
            for (let i = 0; i < s.num_presets; i++) {
                const active = i === s.active_preset ? ' active' : '';
                html += `<button class="preset-btn${active}" data-preset="${i}">${i + 1}</button>`;
            }
        }
        bar.innerHTML = html;
        bar.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sendAction({ type: 'preset_select', index: parseInt(btn.dataset.preset) });
            });
        });
    }

    // --- WebSocket ---
    function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws');

        ws.onopen = () => {
            statusBar.className = 'status-bar connected';
            statusText.textContent = 'Connected';
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        };

        ws.onclose = () => {
            statusBar.className = 'status-bar disconnected';
            statusText.textContent = 'Disconnected — reconnecting…';
            scheduleReconnect();
        };

        ws.onerror = () => { ws.close(); };

        ws.onmessage = evt => {
            try {
                const s = JSON.parse(evt.data);
                renderState(s);
            } catch (e) {
                console.error('Bad message:', e);
            }
        };
    }

    function scheduleReconnect() {
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 1500);
        }
    }

    function sendAction(action) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(action));
        }
    }

    function btnDown(index) { sendAction({ type: 'button_down', index: index }); }
    function btnUp(index) { sendAction({ type: 'button_up', index: index }); }

    // --- Keyboard shortcuts ---
    const keysHeld = {};
    document.addEventListener('keydown', e => {
        if (e.repeat || keysHeld[e.code]) return;
        keysHeld[e.code] = true;
        const btnKey = 'abcdef'.indexOf(e.key.toLowerCase());

        if (btnKey >= 0) {
            e.preventDefault();
            btnDown(btnKey);
        } else if (e.code === 'ArrowLeft') {
            e.preventDefault();
            sendAction({ type: 'encoder_turn', index: 0, clockwise: false });
        } else if (e.code === 'ArrowRight') {
            e.preventDefault();
            sendAction({ type: 'encoder_turn', index: 0, clockwise: true });
        } else if (e.code === 'ArrowUp') {
            e.preventDefault();
            sendAction({ type: 'encoder_turn', index: 1, clockwise: true });
        } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            sendAction({ type: 'encoder_turn', index: 1, clockwise: false });
        }
    });

    document.addEventListener('keyup', e => {
        keysHeld[e.code] = false;
        const btnKey = 'abcdef'.indexOf(e.key.toLowerCase());
        if (btnKey >= 0) {
            e.preventDefault();
            btnUp(btnKey);
        }
    });

    // --- Utilities ---
    function escapeHtml(s) {
        const el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }

    // --- Init ---
    buildLayout();
    connect();
})();
</script>
</body>
</html>
